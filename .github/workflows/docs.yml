name: Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
          sudo mkdir -p /usr/share/fonts/opentype/opendyslexic
          sudo curl -sL "https://github.com/antijingoist/opendyslexic/raw/master/compiled/OpenDyslexic-Regular.otf" -o /usr/share/fonts/opentype/opendyslexic/OpenDyslexic-Regular.otf
          sudo curl -sL "https://github.com/antijingoist/opendyslexic/raw/master/compiled/OpenDyslexic-Bold.otf" -o /usr/share/fonts/opentype/opendyslexic/OpenDyslexic-Bold.otf
          sudo fc-cache -f

      - name: Install dependencies
        run: pip install -r docs/web/requirements.txt

      - name: Build site
        working-directory: ./docs/web
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/web/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
