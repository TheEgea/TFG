name: Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs==1.6.0 mkdocs-material==9.7.4

      - name: Build site
        working-directory: ./docs/web
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/web/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
