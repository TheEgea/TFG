version: '3.8'

services:
  flask:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./app:/app
      - synapse-db:/opt/synapse
    command: >
      sh -c "pip install flask==3.0.0 -q &&
             python init_db.py &&
             python app.py"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask
    restart: unless-stopped

  victim:
    image: mcr.microsoft.com/playwright/python:v1.58.0-noble
    container_name: synapse_victim
    working_dir: /app
    volumes:
      - ./victim:/app
    command: sh -c "pip install --no-cache-dir playwright==1.58.0 && python victim.py"
    depends_on:
      - flask
    restart: unless-stopped

volumes:
  synapse-db:
