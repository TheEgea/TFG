<!DOCTYPE html>
<html>
<head><title>SYNAPSE — Comments</title>
<style>
body{font-family:monospace;background:#0a0a0a;color:#00ff41;margin:0}
nav{background:#111;border-bottom:1px solid #00ff41;padding:12px 24px;display:flex;justify-content:space-between}
nav a{color:#00ff41;text-decoration:none;margin-left:20px}
.container{padding:32px}
h2{letter-spacing:3px;border-bottom:1px solid #333;padding-bottom:10px}
textarea{width:100%;height:80px;background:#111;border:1px solid #00ff41;color:#00ff41;font-family:monospace;padding:8px;box-sizing:border-box}
button{padding:8px 24px;background:#00ff41;color:#000;border:none;cursor:pointer;font-family:monospace;font-weight:bold;margin-top:8px}
.comment{border:1px solid #222;padding:16px;margin-bottom:12px;background:#111}
.comment .author{color:#444;font-size:0.8em;margin-bottom:8px}
</style></head>
<body>
<nav>
  <span>SYNAPSE INTELLIGENCE PORTAL</span>
  <div><a href="/portal">PORTAL</a><a href="/search">SEARCH</a></div>
</nav>
<div class="container">
  <h2>[ COMMENTS ]</h2>
  <form method="post">
    <textarea name="body" placeholder="Add a comment..."></textarea><br>
    <button type="submit">SUBMIT</button>
  </form>
  <br>
  {% for c in comments %}
  <div class="comment">
    <div class="author">{{ c.author }} · {{ c.timestamp }}</div>
    <div class="body">{{ c.body | safe }}</div>
  </div>
  {% endfor %}
</div>
</body></html>
