<!DOCTYPE html>
<html>
<head><title>SYNAPSE Admin</title>
<style>
body{font-family:monospace;background:#0a0a0a;color:#00ff41;margin:0}
nav{background:#111;border-bottom:1px solid #ff4444;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#ff4444;text-decoration:none;margin-left:20px}
.container{padding:32px;max-width:900px}
h2{letter-spacing:3px;border-bottom:1px solid #ff4444;padding-bottom:10px;color:#ff4444}
.intel{border:1px solid #ff4444;padding:20px;margin-bottom:16px;background:#110000}
.intel h4{color:#ff6666;margin:0 0 12px 0;font-size:1.1em;letter-spacing:2px}
.intel pre{color:#ffaa00;white-space:pre-wrap;font-size:0.9em;background:#0a0000;padding:12px;border-left:3px solid #ff4444}
.badge{font-size:0.7em;padding:2px 8px;border:1px solid #ff4444;color:#ff4444}
.warn{color:#ff4444;font-size:0.8em;margin-top:8px}
</style></head>
<body>
<nav>
  <span style="color:#ff4444">SYNAPSE INTELLIGENCE — ADMIN PANEL</span>
  <div>
    <a href="/portal">PORTAL</a>
    <a href="/search">SEARCH</a>
    <span style="color:#666;margin-left:20px">{{ username }} <span class="badge">{{ role }}</span></span>
  </div>
</nav>
<div class="container">
  <h2>[ CLASSIFIED INTELLIGENCE ]</h2>
  {% for item in intel %}
  <div class="intel">
    <h4>{{ item.classification }} — {{ item.title }}</h4>
    <pre>{{ item.content }}</pre>
    <p class="warn">{{ item.author }} · {{ item.timestamp }}</p>
  </div>
  {% endfor %}
</div>
</body></html>
