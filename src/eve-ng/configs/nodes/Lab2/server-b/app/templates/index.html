<!DOCTYPE html>
<html>
<head><title>DataVault — Files</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#080c14;color:#4fc3f7}
nav{background:#0d1b2a;border-bottom:1px solid #1e3a5f;padding:14px 28px;display:flex;justify-content:space-between;align-items:center}
nav span{letter-spacing:3px;font-size:0.9em}
nav a{color:#37474f;text-decoration:none;margin-left:20px;font-size:0.8em;letter-spacing:1px}
nav a:hover{color:#4fc3f7}
.container{padding:32px;max-width:900px}
h2{letter-spacing:3px;font-size:0.95em;color:#37474f;margin-bottom:24px;border-bottom:1px solid #1e3a5f;padding-bottom:12px}
.upload-box{background:#0d1b2a;border:1px dashed #1e3a5f;padding:24px;margin-bottom:28px;text-align:center}
.upload-box label{font-size:0.8em;color:#37474f;letter-spacing:2px}
.upload-box input[type=file]{margin:12px 0;color:#4fc3f7;font-size:0.85em}
.upload-box button{background:#1e3a5f;color:#4fc3f7;border:1px solid #4fc3f7;padding:8px 24px;font-family:monospace;font-size:0.85em;letter-spacing:2px;cursor:pointer}
.upload-box button:hover{background:#4fc3f7;color:#080c14}
.file-list{list-style:none}
.file-list li{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #0d1b2a;background:#0a0f1a}
.file-list li:hover{background:#0d1b2a}
.file-name{color:#4fc3f7;font-size:0.9em}
.file-actions a{color:#37474f;text-decoration:none;margin-left:16px;font-size:0.8em;letter-spacing:1px}
.file-actions a:hover{color:#4fc3f7}
.empty{color:#1e3a5f;text-align:center;padding:32px;font-size:0.85em;letter-spacing:2px}
</style></head>
<body>
<nav>
  <span>SYNAPSE DATAVAULT</span>
  <div>
    <span style="color:#1e3a5f;font-size:0.8em">{{ username }}</span>
    <a href="/logout">LOGOUT</a>
  </div>
</nav>
<div class="container">
  <h2>[ DOCUMENT REPOSITORY ]</h2>
  <div class="upload-box">
    <form method="POST" action="/upload" enctype="multipart/form-data">
      <label>UPLOAD DOCUMENT</label><br>
      <input type="file" name="file" accept=".pdf,.txt,.csv,.yml,.yaml,.dat,.json">
      <br><button type="submit">SUBMIT DOCUMENT</button>
    </form>
  </div>
  {% if files %}
  <ul class="file-list">
    {% for f in files %}
    <li>
      <span class="file-name">{{ f }}</span>
      <span class="file-actions">
        <a href="/preview/{{ f }}">PREVIEW</a>
        <a href="/download/{{ f }}">DOWNLOAD</a>
      </span>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">NO DOCUMENTS FOUND — UPLOAD A FILE TO BEGIN</p>
  {% endif %}
</div>
</body></html>
