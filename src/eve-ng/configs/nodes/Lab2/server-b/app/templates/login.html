<!DOCTYPE html>
<html>
<head><title>SYNAPSE DataVault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#080c14;color:#4fc3f7;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#0d1b2a;border:1px solid #1e3a5f;padding:48px 40px;width:360px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:1.1em;letter-spacing:4px;color:#4fc3f7}
.logo p{font-size:0.7em;color:#37474f;letter-spacing:2px;margin-top:6px}
label{display:block;font-size:0.75em;letter-spacing:2px;color:#37474f;margin-bottom:6px}
input{width:100%;background:#0a0f1a;border:1px solid #1e3a5f;color:#4fc3f7;padding:10px 12px;font-family:monospace;font-size:0.9em;outline:none;margin-bottom:20px}
input:focus{border-color:#4fc3f7}
button{width:100%;background:#1e3a5f;color:#4fc3f7;border:1px solid #4fc3f7;padding:12px;font-family:monospace;font-size:0.9em;letter-spacing:2px;cursor:pointer}
button:hover{background:#4fc3f7;color:#080c14}
.error{color:#ef5350;font-size:0.8em;margin-bottom:16px;text-align:center}
.footer{text-align:center;margin-top:24px;font-size:0.65em;color:#1e3a5f;letter-spacing:1px}
</style></head>
<body>
<div class="card">
  <div class="logo">
    <h1>SYNAPSE DATAVAULT</h1>
    <p>SECURE DOCUMENT MANAGEMENT SYSTEM</p>
  </div>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="POST">
    <label>USERNAME</label>
    <input type="text" name="username" autocomplete="off" autofocus>
    <label>PASSWORD</label>
    <input type="password" name="password">
    <button type="submit">AUTHENTICATE</button>
  </form>
  <p class="footer">AUTHORIZED ACCESS ONLY · SYNAPSE CORP · v2.4.1</p>
</div>
</body></html>
