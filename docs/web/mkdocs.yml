site_name: Ethical Pentesting with EVE-NG
site_description: Bachelor's Thesis - Virtual labs for cybersecurity training
site_author: Eloi Egea Rada
site_url: https://TheEgea.github.io/TFG
repo_url: https://github.com/TheEgea/TFG
edit_uri: edit/main/docs/web/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs
    - navigation.indexes
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Thesis Documentation:
      - Memory: assets/Temp.md
      - Feasibility Study: assets/official_Documents/feasibility.md
      - Appendices: annexos/index.md
  - Basic Configuration:
      - Selected ISOs: assets/init_configs/selected-isos/index.md
      - Router (VyOS): assets/init_configs/Router.md
      - Firewall (pfSense): assets/init_configs/Firewall.md
  - EVE-NG Labs:
      - LAB1 – Reconnaissance:
          - Overview: labs/lab1/index.md
          - Router (VyOS): labs/lab1/router.md
          - Server (PEBCAK): labs/lab1/server.md
          - Firewall (pfSense): labs/lab1/firewall.md
          - PC1: labs/lab1/pc1.md
          - Parrot (Attacker): labs/lab1/parrot.md
      - LAB2 – Web Vulnerabilities:
          - Overview: labs/lab2/index.md
          - Infrastructure: labs/lab2/infra.md
          - VyOS Router: labs/lab2/vyos.md
          - Server-A (SYNAPSE Portal): labs/lab2/server-a.md
          - Server-B (DataVault): labs/lab2/server-b.md
          - Flask App: labs/lab2/flask.md
          - Nginx: labs/lab2/nginx.md
          - Victim Bot: labs/lab2/victim.md
      - LAB3 – Incident Response:
          - Overview: labs/lab3/index.md
          - Infrastructure: labs/lab3/infra.md
          - VyOS Router: labs/lab3/vyos.md
          - pfSense Firewall: labs/lab3/pfsense.md
          - Server-Web (helix-web): labs/lab3/server-web.md
          - Server-DB (helix-db): labs/lab3/server-db.md
          - Evidence Walkthrough: labs/lab3/walkthrough.md
  - Appendices:
      - Overview: annexos/index.md
      - "App A — EVE-NG Installation": annexos/app-a/index.md
      - "App B — Lab 1 Reference": annexos/app-b/index.md
      - "App C — Lab 2 Reference": annexos/app-c/index.md
      - "App D — Lab 3 Reference": annexos/app-d/index.md
      - "App E — Platforms": annexos/app-e/index.md
      - "App F — Objectives & KPIs": annexos/app-f/index.md
      - "App G — Methodology": annexos/app-g/index.md
      - "App H — Requirements": annexos/app-h/index.md
      - "App I — Feasibility": annexos/app-i/index.md
#  - Pentest Labs:
#      - Reconnaissance: labs/recon.md
#      - Web Vulns: labs/web-vulns.md
#      - Priv Esc: labs/priv-esc.md
#      - Crypto: labs/crypto.md

extra_javascript:
  - assets/javascripts/chatbot.js

extra_css:
  - assets/stylesheets/chatbot.css

plugins:
  - search
  - with-pdf:
      author: Eloi Egea Rada
      copyright: CC BY-NC-SA 4.0 — TecnoCampus 2025-2026
      cover: true
      cover_title: Ethical Pentesting with EVE-NG
      cover_subtitle: Bachelor's Thesis Technical Annex
      custom_template_path: pdf_template
      output_path: ../pdf/lab-documentation.pdf


markdown_extensions:
  - abbr
  - attr_list
  - pymdownx.snippets
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
